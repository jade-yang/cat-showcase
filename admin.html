<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 猫咪图鉴</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="nav-back-btn" id="navBackBtn" title="返回首页">
                    <span>🏠</span> 返回首页
                </button>
            </div>
            <div class="nav-center">
                <span class="nav-brand-icon">🗂️</span>
                <span class="nav-brand-text">猫咪管理后台</span>
            </div>
            <div class="nav-right">
                <span class="nav-user-info" id="navUserInfo">
                    <span class="nav-user-icon">😺</span>
                    <span class="nav-user-name" id="navUserName">Admin</span>
                </span>
                <button class="nav-logout-btn nav-pwd-btn" id="navChangePwdBtn" title="修改密码">🔒 修改密码</button>
                <button class="nav-logout-btn" id="navLogoutBtn">退出</button>
                <button class="theme-toggle" id="themeToggle" aria-label="切换夜间模式">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="admin-page">
        <!-- 统计面板 -->
        <section class="stats-section">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon">🐱</div>
                    <div class="stat-value" id="statTotalCats">0</div>
                    <div class="stat-label">总猫咪数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👍</div>
                    <div class="stat-value" id="statTotalLikes">0</div>
                    <div class="stat-label">总点赞数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">❤️</div>
                    <div class="stat-value" id="statTotalFavorites">0</div>
                    <div class="stat-label">总收藏数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📤</div>
                    <div class="stat-value" id="statTotalShares">0</div>
                    <div class="stat-label">总分享数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👀</div>
                    <div class="stat-value" id="statTotalViews">0</div>
                    <div class="stat-label">总浏览量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎮</div>
                    <div class="stat-value" id="statTotalGame">0</div>
                    <div class="stat-label">总互动数</div>
                </div>
            </div>
        </section>

        <!-- 标签导航 -->
        <section class="tabs-section">
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="cats">🐱 猫咪管理</button>
                <button class="tab-btn" data-tab="users">👥 用户管理</button>
            </div>
        </section>

        <!-- 猫咪管理区域 -->
        <div class="tab-panel active" id="tabCats">

        <!-- 操作栏 -->
        <section class="toolbar-section">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="搜索名字或品种...">
                    </div>
                    <select id="levelFilter" class="toolbar-select">
                        <option value="">全部等级</option>
                        <option value="1">Lv.1 新手萌猫</option>
                        <option value="2">Lv.2 活跃小猫</option>
                        <option value="3">Lv.3 人气猫咪</option>
                        <option value="4">Lv.4 明星喵喵</option>
                        <option value="5">Lv.5 传说猫王</option>
                        <option value="6">Lv.6 宇宙喵神</option>
                    </select>
                    <select id="sortSelect" class="toolbar-select">
                        <option value="createdAt-desc">创建时间 新→旧</option>
                        <option value="createdAt-asc">创建时间 旧→新</option>
                        <option value="name-asc">名字 A→Z</option>
                        <option value="name-desc">名字 Z→A</option>
                        <option value="exp-desc">EXP 高→低</option>
                        <option value="likes-desc">点赞 高→低</option>
                        <option value="age-asc">年龄 小→大</option>
                    </select>
                </div>
                <div class="toolbar-right">
                    <button class="add-cat-btn" id="addCatBtn">
                        <span>➕</span> 新增猫咪
                    </button>
                </div>
            </div>
        </section>

        <!-- 数据表格 -->
        <section class="table-section">
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="th-img">图片</th>
                            <th class="th-name">名字</th>
                            <th class="th-breed">品种</th>
                            <th class="th-age">年龄</th>
                            <th class="th-traits">性格</th>
                            <th class="th-exp">EXP</th>
                            <th class="th-level">等级</th>
                            <th class="th-time">创建时间</th>
                            <th class="th-source">来源</th>
                            <th class="th-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="catsTableBody">
                        <tr class="table-empty-row">
                            <td colspan="10">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        </div><!-- /tabCats -->

        <!-- 用户管理区域 -->
        <div class="tab-panel" id="tabUsers" style="display:none;">
            <section class="toolbar-section">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="search-box">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            </svg>
                            <input type="text" id="userSearchInput" placeholder="搜索用户名、邮箱或显示名...">
                        </div>
                        <select id="userSortSelect" class="toolbar-select">
                            <option value="createdAt-desc">注册时间 新→旧</option>
                            <option value="createdAt-asc">注册时间 旧→新</option>
                            <option value="username-asc">用户名 A→Z</option>
                            <option value="username-desc">用户名 Z→A</option>
                        </select>
                    </div>
                </div>
            </section>
            <section class="table-section">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>显示名</th>
                                <th>邮箱</th>
                                <th>角色</th>
                                <th>注册时间</th>
                                <th style="width:210px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr class="table-empty-row"><td colspan="6">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div><!-- /tabUsers -->
    </div>

    <!-- 编辑用户弹窗 -->
    <div class="modal-overlay" id="catFormModal">
        <div class="modal-content">
            <button class="modal-close" id="catFormClose">✕</button>
            <div class="modal-body">
                <h2 class="modal-title" id="catFormTitle">新增猫咪</h2>
                <form id="catForm">
                    <input type="hidden" id="editCatId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>名字 <span class="required">*</span></label>
                            <input type="text" id="catName" placeholder="猫咪名字" required maxlength="80">
                        </div>
                        <div class="form-group">
                            <label>品种 <span class="required">*</span></label>
                            <input type="text" id="catBreed" placeholder="品种" required maxlength="80">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>年龄（岁）<span class="required">*</span></label>
                            <input type="number" id="catAge" placeholder="0" min="0" max="30" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>喜欢的玩具/食物</label>
                            <input type="text" id="catFavorite" placeholder="逗猫棒" maxlength="80">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>性格标签 <span class="required">*</span>（可多选）</label>
                        <div class="tags-selector">
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="粘人"><span class="tag-label">粘人</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="活泼"><span class="tag-label">活泼</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="安静"><span class="tag-label">安静</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="爱睡觉"><span class="tag-label">爱睡觉</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="胆小"><span class="tag-label">胆小</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="好奇"><span class="tag-label">好奇</span></label>
                            <label class="tag-checkbox"><input type="checkbox" name="traits" value="贪吃"><span class="tag-label">贪吃</span></label>
                        </div>
                        <span class="validation-msg" id="traitsValidation">请至少选择一个性格标签</span>
                    </div>
                    <div class="form-group">
                        <label>简介</label>
                        <textarea id="catDesc" placeholder="介绍一下猫咪..." rows="3" maxlength="300"></textarea>
                    </div>
                    <div class="form-group">
                        <label>图片 URL</label>
                        <input type="url" id="catImg" placeholder="https://example.com/cat.jpg">
                    </div>
                    <div class="form-check">
                        <label>
                            <input type="checkbox" id="isSystemCat">
                            <span>标记为系统猫咪（非用户上传）</span>
                        </label>
                    </div>
                    <div class="form-error" id="formError" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="catFormSubmitBtn">
                            <span>💾</span> 保存
                        </button>
                        <button type="button" class="cancel-btn" id="catFormCancelBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content confirm-content">
            <div class="modal-body">
                <h2 class="confirm-title">⚠️ 删除猫咪</h2>
                <p class="confirm-text" id="confirmText">确定要删除这只猫咪吗？此操作同时删除关联评论，不可撤销。</p>
                <div class="confirm-actions">
                    <button class="submit-btn danger-btn" id="confirmDeleteBtn">
                        <span>🗑️</span> 确认删除
                    </button>
                    <button class="cancel-btn" id="confirmCancelBtn">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <button class="modal-close" id="passwordModalClose">✕</button>
            <div class="modal-body">
                <h2 class="modal-title">🔒 修改密码</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>当前密码 <span class="required">*</span></label>
                        <input type="password" id="oldPassword" placeholder="输入当前密码" required>
                    </div>
                    <div class="form-group">
                        <label>新密码 <span class="required">*</span></label>
                        <input type="password" id="newPassword" placeholder="至少6位" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>确认新密码 <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" placeholder="再次输入新密码" minlength="6" required>
                        <span class="validation-msg" id="pwMatchMsg" style="display:none;">两次输入的新密码不一致</span>
                    </div>
                    <div class="form-error" id="pwFormError" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="pwSubmitBtn">
                            <span>💾</span> 保存修改
                        </button>
                        <button type="button" class="cancel-btn" id="pwCancelBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 编辑用户弹窗 -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal-content">
            <button class="modal-close" id="editUserClose">✕</button>
            <div class="modal-body">
                <h2 class="modal-title">✏️ 编辑用户</h2>
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="editUserUsername" disabled>
                    </div>
                    <div class="form-group">
                        <label>显示名 <span class="required">*</span></label>
                        <input type="text" id="editUserDisplayName" required maxlength="40">
                    </div>
                    <div class="form-group">
                        <label>邮箱 <span class="required">*</span></label>
                        <input type="email" id="editUserEmail" required>
                    </div>
                    <div class="form-error" id="editUserError" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="editUserSubmitBtn"><span>💾</span> 保存</button>
                        <button type="button" class="cancel-btn" id="editUserCancelBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 重置用户密码弹窗 -->
    <div class="modal-overlay" id="resetPwdModal">
        <div class="modal-content">
            <button class="modal-close" id="resetPwdClose">✕</button>
            <div class="modal-body">
                <h2 class="modal-title">🔑 重置密码</h2>
                <p style="color:var(--text-light);text-align:center;margin-bottom:16px;" id="resetPwdTarget"></p>
                <form id="resetPwdForm">
                    <div class="form-group">
                        <label>新密码 <span class="required">*</span></label>
                        <input type="password" id="resetNewPwd" placeholder="至少6位" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码 <span class="required">*</span></label>
                        <input type="password" id="resetConfirmPwd" placeholder="再次输入" minlength="6" required>
                        <span class="validation-msg" id="resetPwdMatch" style="display:none;">两次密码不一致</span>
                    </div>
                    <div class="form-error" id="resetPwdError" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="resetPwdSubmitBtn"><span>💾</span> 重置</button>
                        <button type="button" class="cancel-btn" id="resetPwdCancelBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 删除用户确认弹窗 -->
    <div class="modal-overlay" id="confirmUserModal">
        <div class="modal-content confirm-content">
            <div class="modal-body">
                <h2 class="confirm-title">⚠️ 删除用户</h2>
                <p class="confirm-text" id="confirmUserText"></p>
                <div class="confirm-actions">
                    <button class="submit-btn danger-btn" id="confirmUserDeleteBtn"><span>🗑️</span> 确认删除</button>
                    <button class="cancel-btn" id="confirmUserCancelBtn">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
